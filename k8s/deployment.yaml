apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: csekub-app
  template:
    metadata:
      labels:
        app: csekub-app
    spec:
      containers:
      - name: springboot-container
        image: naveenkumar6788/csekub:latest
        ports:
        - containerPort: 8085